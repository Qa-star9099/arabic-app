<style>
@keyframes breath {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.15); opacity: 0.25; }
}
@keyframes breath2 {
  0%,100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.2); opacity: 0.15; }
}
@keyframes breath3 {
  0%,100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.25); opacity: 0.1; }
}
@keyframes pop-in {
  0% { transform: scale(0.7); opacity: 0; }
  70% { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes tag-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 0.55; transform: translateY(0); }
}
@keyframes bar-fill {
  from { width: 0%; }
  to { width: 72%; }
}
@keyframes dot1 { 0%,100%{opacity:0.25} 25%{opacity:1} }
@keyframes dot2 { 0%,100%{opacity:0.25} 50%{opacity:1} }
@keyframes dot3 { 0%,100%{opacity:0.25} 75%{opacity:1} }
.r1 { animation: breath 3.2s ease-in-out infinite; }
.r2 { animation: breath2 3.2s ease-in-out infinite 0.5s; }
.r3 { animation: breath3 3.2s ease-in-out infinite 1s; }
.logo-pop { animation: pop-in 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }
.name-in { animation: fade-up 0.6s ease 0.85s both; }
.tag-in { animation: tag-in 0.6s ease 1.1s both; }
.bar-in { animation: bar-fill 2.2s cubic-bezier(0.4,0,0.2,1) 1.4s both; }
.d1 { animation: dot1 1.2s ease-in-out 1.4s infinite; }
.d2 { animation: dot2 1.2s ease-in-out 1.4s infinite; }
.d3 { animation: dot3 1.2s ease-in-out 1.4s infinite; }
</style>

<div style="background: #080B1A; border-radius: var(--border-radius-lg); padding: 1.25rem;">
<h2 class="sr-only">Splash screen — animated logo reveal for the Arabic learning app</h2>

<div style="max-width: 340px; margin: 0 auto; background: #080B1A; border-radius: 36px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.06); min-height: 580px; display: flex; flex-direction: column; align-items: center; justify-content: center;">

  <div style="position: absolute; inset: 0; overflow: hidden;">
    <div style="position: absolute; top: -80px; left: -80px; width: 320px; height: 320px; border-radius: 50%; background: #1D9E75; opacity: 0.08;" class="r3"></div>
    <div style="position: absolute; bottom: -60px; right: -60px; width: 280px; height: 280px; border-radius: 50%; background: #533AB7; opacity: 0.1;" class="r2"></div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 340px; height: 340px; border-radius: 50%; background: #1D9E75; opacity: 0.05;" class="r1"></div>
    <div style="position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0); background-size: 28px 28px;"></div>
  </div>

  <div style="position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; padding: 0 32px;">

    <div class="logo-pop" style="position: relative; width: 110px; height: 110px; margin-bottom: 32px;">
      <div style="position: absolute; inset: 0; border-radius: 28px; background: rgba(29,158,117,0.12); border: 1px solid rgba(29,158,117,0.2);"></div>
      <div style="position: absolute; inset: 10px; border-radius: 20px; background: rgba(29,158,117,0.18); border: 1px solid rgba(29,158,117,0.3);"></div>
      <div style="position: absolute; inset: 20px; border-radius: 14px; background: #0F6E56; border: 1px solid rgba(93,202,165,0.4); display: flex; align-items: center; justify-content: center;">
        <span style="font-size: 40px; color: #ffffff; font-family: var(--font-serif); font-weight: 500; line-height: 1; margin-top: 4px;">ع</span>
      </div>

      <div style="position: absolute; top: -4px; right: -4px; width: 28px; height: 28px; border-radius: 50%; background: #BA7517; border: 2.5px solid #080B1A; display: flex; align-items: center; justify-content: center;">
        <i class="ti ti-microphone" style="font-size: 13px; color: #ffffff;" aria-hidden="true"></i>
      </div>
      <div style="position: absolute; bottom: -4px; left: -4px; width: 24px; height: 24px; border-radius: 50%; background: #533AB7; border: 2px solid #080B1A; display: flex; align-items: center; justify-content: center;">
        <i class="ti ti-star" style="font-size: 12px; color: #ffffff;" aria-hidden="true"></i>
      </div>
    </div>

    <h1 class="name-in" style="font-size: 32px; font-weight: 500; color: #ffffff; margin: 0 0 8px; letter-spacing: -0.8px; text-align: center;">Arabcha</h1>
    <p class="tag-in" style="font-size: 14px; color: rgba(255,255,255,0.55); margin: 0 0 56px; letter-spacing: 0.6px; text-align: center; font-weight: 400;">Arabic · the Uzbek way</p>

    <div style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 14px;">
      <div style="width: 180px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.07); overflow: hidden;">
        <div class="bar-in" style="height: 100%; border-radius: 2px; background: #1D9E75; width: 0%;"></div>
      </div>
      <div style="display: flex; gap: 6px; align-items: center;">
        <div class="d1" style="width: 5px; height: 5px; border-radius: 50%; background: #1D9E75;"></div>
        <div class="d2" style="width: 5px; height: 5px; border-radius: 50%; background: #1D9E75;"></div>
        <div class="d3" style="width: 5px; height: 5px; border-radius: 50%; background: #1D9E75;"></div>
      </div>
    </div>

  </div>

  <div style="position: absolute; bottom: 32px; left: 0; right: 0; text-align: center;">
    <p style="font-size: 11px; color: rgba(255,255,255,0.18); letter-spacing: 1px; margin: 0;">POWERED BY AI</p>
  </div>

</div>
</div>
